name: GH Buddy CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-smoke-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build sample assets
        run: |
          python generate_sample_data.py
          python generate_logo.py
          python generate_report.py

      - name: Streamlit syntax check
        run: python -m py_compile src/*.py

      - name: Deployment note
        run: |
          echo "Deploy to Streamlit Cloud via GitHub integration."
          echo "Set GEMINI_API_KEY and HUGGINGFACE_API_KEY in Streamlit secrets."
